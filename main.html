<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal</title>
    <link rel="stylesheet" href="public/css/estilo.css" />
</head>

<body>
    <header>
        <h1>Biblioteca</h1>
    </header>

    <button class="botao" id="btnPesquisa">pesquisas</button>

    <main>
        <section class="lista-coluna" id="container-forms">

            <article id="container-leitor" class="form-container">
                <form id="formLeitor" method="POST">
                    <h2>Cadastro de Cliente</h2>

                    <label for="categoria-leitor">Categoria do Leitor</label>
                    <select id="categoria-leitor" name="categoria-leitor" class="opcao">
                        <option value="0" default>categoria</option>
                        <option value="1">Estudante</option>
                        <option value="2">Professor</option>
                        <option value="3">Comunidade</option>
                    </select>

                    <input type="text" id="nome-leitor" name="nome-leitor" placeholder="Nome">

                    <input type="text" id="email" name="email" placeholder="Email">

                    <input type="text" id="telefone" name="telefone" placeholder="Telefone">

                    <input type="text" id="cpf" name="cpf" placeholder="CPF">

                    <label for="endereco">Endereço Completo</label>
                    <input type="text" id="rua" name="rua" placeholder="Rua">
                    <input type="number" id="numero" name="numero" placeholder="Número">
                    <input type="text" id="bairro" name="bairro" placeholder="Bairro">
                    <input type="text" id="cidade" name="cidade" placeholder="Cidade">
                    <input type="text" id="cep" name="cep" placeholder="CEP">
                    <button type="submit">Cadastrar Cliente</button>
                </form>
            </article>

            <article id="container-livro" class="form-container">
                <form id="formLivro" method="POST">
                    <h2>Cadastro de Livro</h2>

                    <input type="text" id="titulo" name="titulo" placeholder="Titulo">

                    <input type="date" id="ano-publicacao" name="ano-publicacao" placeholder="Ano de Publicacao">

                    <input type="text" id="editora" name="editora" placeholder="Editora">

                    <input type="text" id="observacao" name="observacao" placeholder="Observação">

                    <input type="text" id="isbn" name="isbn" placeholder="Isbn">

                    <label for="categoria-livro">Categoria do Livro</label>
                    <select id="categoria-livro" name="categoria-livro" class="opcao">
                        <option value="0" default>categoria</option>
                        <option value="1">Romance</option>
                        <option value="2">Fantasia</option>
                        <option value="3">Ficção Científica</option>
                        <option value="4">Suspense e Policial</option>
                        <option value="5">Conto e Crônica</option>
                        <option value="6">Biografia e Autobiografia</option>
                        <option value="7">Desenvolvimento Pessoal e Autoajuda</option>
                        <option value="8" default>Didáticos e Acadêmicos</option>
                        <option value="9">História e Filosofia</option>
                        <option value="10">Quadrinhos</option>
                        <option value="11">Poesia</option>
                    </select>

                    <button type="submit">Cadastrar Livro</button>
                </form>
            </article>


            <article id="container-autor" class="form-container">
                <form id="formAutor" method="POST">
                    <h2>Cadastro de Aluguel</h2>

                    <input type="text" id="nome-autor" name="nome-autor" placeholder="Nome do Autor">

                    <input type="text" id="livros-publicados" name="livros-publicados" placeholder="Nome do Livro">

                    <button type="submit">Cadastrar aluguel</button>
                </form>
            </article>

            <article id="container-aluguel" class="form-container">
                <form id="formAluguel" method="POST">
                    <h2>Cadastro de Aluguel</h2>

                    <label for="data-aluguel">Data do Aluguel</label>
                    <input type="date" id="data-aluguel" name="data-aluguel">

                    <label for="data-devolucao">Data de Devolução</label>
                    <input type="date" id="data-devolucao" name="data-devolucao">

                    <input type="text" id="nome-cliente-aluguel" name="nome-cliente-aluguel"
                        placeholder="Nome do Cliente">

                    <input type="text" id="livro-aluguel-1" name="livro-aluguel-1" placeholder="Nome do Livro 1">

                    <input type="text" id="livro-aluguel-2" name="livro-aluguel-2" placeholder="Nome do Livro 2">

                    <input type="text" id="livro-aluguel-3" name="livro-aluguel-3" placeholder="Nome do Livro 3">

                    <button type="submit">Cadastrar aluguel</button>
                </form>
            </article>
        </section>

    </main>
    <footer>
        <p>&copy; Todos os Direitos Reservados</p>
    </footer>
</body>

</html>
